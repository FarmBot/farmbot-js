name: test

on: [push, pull_request]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: node
      uses: actions/setup-node@v6
      with:
        node-version: 24.x
        cache: 'npm'
    - run: npm ci
    - run: npm run build
    - run: npm run typecheck
    - run: npm test
    - name: Report Coveralls
      uses: coverallsapp/github-action@v2
      with:
        file: coverage/lcov.info
